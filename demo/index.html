<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jalali-datepicker — Persian (Jalali) date picker for React</title>
    <meta
      name="description"
      content="A self-contained, RTL-first Persian (Jalali) date picker for React — single & range selection, injectable holidays, and theming via CSS variables."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Vazirmatn is used by the picker itself (Persian UI); the page chrome uses the system font. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #1c1917;
        --muted: #78716c;
        --line: #e7e5e4;
        --panel: #ffffff;
        --page: #faf9f7;
        --accent: #e4ae21;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          sans-serif;
        background: var(--page);
        color: var(--ink);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }
      #root {
        min-height: 100vh;
      }
      code {
        font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
      }
      a {
        color: inherit;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
