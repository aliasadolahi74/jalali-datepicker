name: Release

# Runs semantic-release on every push to main. The version is computed from
# Conventional Commit messages since the last release tag — no manual tagging.
#   fix:      -> patch    feat:     -> minor    feat!/BREAKING -> major
# semantic-release tags, generates the changelog, creates the GitHub Release,
# and publishes to npm. Commits with no releasable change publish nothing.
on:
  push:
    branches: [main]

permissions:
  contents: write # create tags, releases, and commit the changelog back
  issues: write # comment on released issues
  pull-requests: write # comment on released PRs
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release needs full history to read tags
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
